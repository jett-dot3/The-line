name: THE LINE — Generate Daily Picks

on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Breaking notes (injuries, postponements, line movement)'
        required: false
        default: ''
      query:
        description: |
          Search query for focused picks. Examples:
          "Best home run picks today"
          "Best unders on the board tonight"
          "Top strikeout props"
          "Best player props for Lakers game"
          "Same game parlay Cubs vs Cardinals"
          Leave blank for full picks report.
        required: false
        default: ''
      date:
        description: 'Date to generate for (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''
      skip_statcast:
        description: 'Skip Baseball Savant? (true/false)'
        required: false
        default: 'false'
      skip_nba_api:
        description: 'Skip NBA.com API? (true/false)'
        required: false
        default: 'false'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Verify secrets are loaded
        run: echo "Anthropic key length is ${#ANTHROPIC_API_KEY}"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate picks
        run: |
          SKIP_FLAGS=""
          if [ "${{ github.event.inputs.skip_statcast }}" = "true" ]; then
            SKIP_FLAGS="$SKIP_FLAGS --skip-statcast"
          fi
          if [ "${{ github.event.inputs.skip_nba_api }}" = "true" ]; then
            SKIP_FLAGS="$SKIP_FLAGS --skip-nba-api"
          fi

          DATE_FLAG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_FLAG="--date ${{ github.event.inputs.date }}"
          fi

          QUERY_FLAG=""
          if [ -n "${{ github.event.inputs.query }}" ]; then
            QUERY_FLAG="--query ${{ github.event.inputs.query }}"
          fi

          python generate.py \
            --notes "${{ github.event.inputs.notes }}" \
            $DATE_FLAG \
            $SKIP_FLAGS \
            $QUERY_FLAG \
            --output index.html
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ODDS_API_KEY:      ${{ secrets.ODDS_API_KEY }}
          WEATHER_API_KEY:   ${{ secrets.WEATHER_API_KEY }}

      - name: Commit and push updated site
        run: |
          git config user.name  "The Line Bot"
          git config user.email "bot@theline.picks"
          git add index.html picks_latest.json
          git diff --staged --quiet || \
            git commit -m "Picks update $(date '+%b %d %Y %H:%M') — ${{ github.event.inputs.query || github.event.inputs.notes || 'fresh pull' }}"
          git push
